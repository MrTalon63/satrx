<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Satdump API Visualizer</title>
		<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
	</head>

	<body>
		<div class="container">
			<div id="apiUriInput" class="setup-section" hidden>
				<div class="setup-card">
					<h2>Configure API</h2>
					<div class="input-group">
						<label for="apiUri">API URI</label>
						<input type="text" id="apiUri" placeholder="http://localhost:8801/api" class="input-field" />
					</div>
					<button
						class="btn btn-primary"
						onclick="
							localStorage.setItem('satdumpApiURI', document.getElementById('apiUri').value);
							document.getElementById('apiUriInput').hidden = true;
							document.getElementById('dataDisplay').hidden = false;
							document.getElementById('apiUriLink').href = document.getElementById('apiUri').value;
							document.getElementById('apiUriLink').textContent = document.getElementById('apiUri').value;
						">
						Connect
					</button>
				</div>
			</div>

			<div id="dataDisplay">
				<div class="header-bar">
					<div class="api-info">
						<a id="apiUriLink" class="api-link" target="_blank"></a>
					</div>
					<div class="status-info">
						<span class="status-dot" id="statusDot"></span>
						<span id="lastUpdate">Initializing...</span>
						<button
							class="btn btn-icon"
							style="color: var(--error)"
							onclick="
								localStorage.removeItem('satdumpApiURI');
								document.getElementById('apiUriInput').hidden = false;
								document.getElementById('dataDisplay').hidden = true;
							">
							X
						</button>
					</div>
				</div>

				<div id="dataContent" class="data-grid">
					<div class="card">
						<div class="card-content">
							<div class="data-row">
								<span class="label">Satellite</span>
								<span class="value" id="trackedObject">—</span>
							</div>
							<div class="data-row">
								<span class="label">Position</span>
								<span class="value compact" id="objectPosition">—</span>
							</div>
							<div class="data-row">
								<span class="label">Range</span>
								<span class="value" id="objectSlantRange">—</span>
							</div>
						</div>
					</div>

					<div class="card">
						<div class="card-content">
							<div class="data-row">
								<span class="label">Next AOS</span>
								<span class="value" id="nextAos">—</span>
							</div>
							<div class="data-row">
								<span class="label">Next LOS</span>
								<span class="value" id="nextLos">—</span>
							</div>
						</div>
					</div>

					<div class="card">
						<div class="card-content">
							<div class="data-row">
								<span class="label">Frequency</span>
								<span class="value" id="frequency">—</span>
							</div>
							<div class="data-row">
								<span class="label">Peak SNR</span>
								<span class="value" id="peakSnr">—</span>
							</div>
							<div class="data-row">
								<span class="label">SNR</span>
								<span class="value" id="Snr">—</span>
							</div>
							<div class="data-row">
								<span class="label">Avg. SNR</span>
								<span class="value" id="avgSnr">—</span>
							</div>
						</div>
					</div>

					<div class="card">
						<div class="card-content">
							<div class="data-row">
								<span class="label">Viterbi</span>
								<span class="value" id="viterbiLock">—</span>
							</div>
							<div class="data-row">
								<span class="label">Deframer</span>
								<span class="value" id="deframerLock">—</span>
							</div>
							<div class="data-row">
								<span class="label">BER</span>
								<span class="value" id="viterbiBer">—</span>
							</div>
						</div>
					</div>

					<div class="chart-container">
						<div class="chart-header">
							<p class="section-title">SNR Trend</p>
							<div class="chart-header-controls">
								<label for="autoDownload" class="auto-download-control">
									<input type="checkbox" id="autoDownload" value="false" />
									<span>Auto-download CSV</span>
								</label>
								<button id="downloadCsvBtn" class="btn btn-primary chart-download-btn" onclick="getCsv()" disabled>Download CSV</button>
							</div>
						</div>
						<div class="chart-canvas-wrap">
							<canvas id="snrChart"></canvas>
						</div>
					</div>

					<div class="spectrum-container">
						<p class="section-title">Spectrum (FFT)</p>
						<img id="spectrumImage" class="spectrum-image" src="" alt="Spectrum Image" />
					</div>
				</div>
			</div>
		</div>
	</body>

	<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

	<script>
		let freshState = true;
		let prevNextEventIsAos = null;
		let avgSNR = null;
		let snrChartInstance = null;
		let isFetchingApi = false;
		let lastChartSampleAt = 0;
		let chartTimestampHistory = [];
		let chartSnrHistory = [];
		let rawTimestampHistory = [];
		let rawSnrHistory = [];
		let rawViterbiBerHistory = [];
		let rawViterbiLockHistory = [];
		let rawDeframerLockHistory = [];
		let rawRangeHistory = [];
		let rawElevationHistory = [];
		let rawAzimuthHistory = [];
		const CHART_SAMPLE_INTERVAL_MS = 500;
		const CHART_MAX_POINTS = 60;

		function getStatusColor(stale) {
			return stale ? "#ef4444" : "#10b981";
		}

		function formatHz(hz) {
			if (hz >= 1e9) return (hz / 1e9).toFixed(2) + " GHz";
			if (hz >= 1e6) return (hz / 1e6).toFixed(2) + " MHz";
			if (hz >= 1e3) return (hz / 1e3).toFixed(2) + " kHz";
			return hz.toFixed(0) + " Hz";
		}

		function getLockStatusClass(isLocked) {
			return isLocked ? "status-locked" : "status-unlocked";
		}

		function resetHistories() {
			chartSnrHistory = [];
			chartTimestampHistory = [];
			rawSnrHistory = [];
			rawElevationHistory = [];
			rawAzimuthHistory = [];
			rawViterbiBerHistory = [];
			rawViterbiLockHistory = [];
			rawDeframerLockHistory = [];
			rawRangeHistory = [];
			rawTimestampHistory = [];
			lastChartSampleAt = 0;
		}

		function getCsv() {
			if (!rawTimestampHistory || rawTimestampHistory.length === 0) {
				return;
			}

			const headers = ["timestamp", "snr", "avg_snr", "viterbi_ber", "viterbi_lock", "deframer_lock", "range", "elevation", "azimuth"];
			const rows = rawTimestampHistory.map((timestamp, i) => [timestamp.toISOString(), rawSnrHistory[i] !== undefined ? rawSnrHistory[i].toFixed(2) : "", avgSNR !== null ? avgSNR.toFixed(2) : "", rawViterbiBerHistory[i] !== undefined ? rawViterbiBerHistory[i] : "", rawViterbiLockHistory[i] !== undefined ? (rawViterbiLockHistory[i] ? "Locked" : "Unlocked") : "", rawDeframerLockHistory[i] !== undefined ? (rawDeframerLockHistory[i] ? "Locked" : "Unlocked") : "", rawRangeHistory[i] !== undefined ? rawRangeHistory[i].toFixed(0) : "", rawElevationHistory[i] !== undefined ? rawElevationHistory[i].toFixed(1) : "", rawAzimuthHistory[i] !== undefined ? rawAzimuthHistory[i].toFixed(1) : ""]);

			const csvContent = "data:text/csv;charset=utf-8," + [headers.join(","), ...rows.map((r) => r.join(","))].join("\n");

			const encodedUri = encodeURI(csvContent);
			const link = document.createElement("a");
			link.setAttribute("href", encodedUri);
			link.setAttribute("download", `satdump_data_${new Date().toISOString()}.csv`);
			document.body.appendChild(link);
			link.click();
			document.body.removeChild(link);
		}

		window.onload = () => {
			const apiURI = localStorage.getItem("satdumpApiURI");
			document.getElementById("downloadCsvBtn").disabled = true;
			localStorage.removeItem("lastUpdate");
			if (!apiURI) {
				document.getElementById("dataDisplay").hidden = true;
				document.getElementById("apiUriInput").hidden = false;
				return;
			}

			document.getElementById("apiUriInput").hidden = true;
			document.getElementById("dataDisplay").hidden = false;
			document.getElementById("apiUriLink").href = apiURI;
			document.getElementById("apiUriLink").textContent = apiURI;
		};

		setInterval(() => {
			const apiURI = localStorage.getItem("satdumpApiURI");
			const downloadCsvBtn = document.getElementById("downloadCsvBtn");
			if (!apiURI) {
				document.getElementById("dataDisplay").hidden = true;
				document.getElementById("apiUriInput").hidden = false;
				downloadCsvBtn.disabled = true;
				isFetchingApi = false;
				return;
			}

			const lastUpdate = localStorage.getItem("lastUpdate");
			const statusDot = document.getElementById("statusDot");

			if (lastUpdate) {
				const timeDiff = new Date() - new Date(lastUpdate);
				const isStale = timeDiff > 10000;
				const isHealthy = !isStale;

				statusDot.style.backgroundColor = getStatusColor(!isHealthy);
				statusDot.classList.toggle("pulse", isHealthy);

				if (!isHealthy) {
					document.getElementById("lastUpdate").textContent = "⚠ Data is stale • Last update: " + new Date(lastUpdate).toLocaleTimeString();
					document.getElementById("lastUpdate").classList.add("stale");
				} else {
					document.getElementById("lastUpdate").textContent = "Connected • Last update: " + new Date(lastUpdate).toLocaleTimeString();
					document.getElementById("lastUpdate").classList.remove("stale");
				}
			} else {
				statusDot.style.backgroundColor = getStatusColor(true);
				statusDot.classList.remove("pulse");
				document.getElementById("lastUpdate").textContent = "Waiting for data...";
				document.getElementById("lastUpdate").classList.add("stale");
			}

			if (isFetchingApi) {
				return;
			}
			isFetchingApi = true;

			fetch(apiURI, {})
				.then((response) => response.json())
				.then((data) => {
					localStorage.setItem("lastUpdate", new Date().toISOString());
					if (freshState) {
						document.querySelectorAll('[id*="Data"]').forEach((el) => (el.hidden = false));
						freshState = false;
					}

					const trackName = data.object_tracker.object_name;
					document.getElementById("trackedObject").textContent = trackName;
					document.getElementById("statusDot").classList.remove("pulse");

					// Check if AOS occurred (next event switched from AOS to LOS)
					const nextEventIsAos = data.object_tracker.next_event_is_aos;
					if (prevNextEventIsAos === true && nextEventIsAos === false) {
						// AOS occurred: start a fresh history for the new pass.
						resetHistories();
					}
					// Check if LOS occurred (next event switched from LOS to AOS)
					else if (prevNextEventIsAos === false && nextEventIsAos === true) {
						if (chartSnrHistory.length > 0) {
							const autoDownload = document.getElementById("autoDownload").checked;
							if (autoDownload) {
								getCsv();
								// If we just downloaded the CSV, might as well clear the arrays. They can lag a lot
								resetHistories();
							}
						}
					}
					prevNextEventIsAos = nextEventIsAos;

					const nextAosDate = new Date(data.object_tracker.next_aos_time * 1000);
					const nextLosDate = new Date(data.object_tracker.next_los_time * 1000);

					if (data.object_tracker.next_event_is_aos) {
						document.getElementById("nextAos").innerHTML = `<span class="event-soon">↓ ${nextAosDate.toLocaleTimeString()}</span> (in ${data.object_tracker.next_event_in.toFixed(1)}s)`;
					} else {
						document.getElementById("nextAos").textContent = nextAosDate.toLocaleTimeString();
					}

					if (!data.object_tracker.next_event_is_aos) {
						document.getElementById("nextLos").innerHTML = `<span class="event-soon">↑ ${nextLosDate.toLocaleTimeString()}</span> (in ${data.object_tracker.next_event_in.toFixed(1)}s)`;
					} else {
						document.getElementById("nextLos").textContent = nextLosDate.toLocaleTimeString();
					}

					document.getElementById("objectPosition").textContent = `Az ${data.object_tracker.sat_current_pos.az.toFixed(1)}° • El ${data.object_tracker.sat_current_pos.el.toFixed(1)}°`;
					document.getElementById("objectSlantRange").textContent = `${data.object_tracker.sat_current_range.toFixed(0)} km`;

					if (data.vfos && Object.keys(data.vfos).length > 0) {
						const vfoKey = Object.keys(data.vfos)[0];
						const vfoData = data.vfos[vfoKey];
						const sampleTime = new Date();

						rawSnrHistory.push(vfoData.live_pipeline.psk_demod.snr);
						rawElevationHistory.push(data.object_tracker.sat_current_pos.el);
						rawAzimuthHistory.push(data.object_tracker.sat_current_pos.az);
						rawViterbiBerHistory.push(vfoData.live_pipeline.ccsds_conv_concat_decoder.viterbi_ber);
						rawViterbiLockHistory.push(vfoData.live_pipeline.ccsds_conv_concat_decoder.viterbi_lock);
						rawDeframerLockHistory.push(vfoData.live_pipeline.ccsds_conv_concat_decoder.deframer_lock);
						rawRangeHistory.push(data.object_tracker.sat_current_range);
						rawTimestampHistory.push(sampleTime);

						const nowMs = Date.now();
						const shouldSampleChart = nowMs - lastChartSampleAt >= CHART_SAMPLE_INTERVAL_MS;
						if (shouldSampleChart) {
							chartSnrHistory.push(vfoData.live_pipeline.psk_demod.snr);
							chartTimestampHistory.push(sampleTime);
							lastChartSampleAt = nowMs;

							if (chartTimestampHistory.length > CHART_MAX_POINTS) {
								chartTimestampHistory.shift();
								chartSnrHistory.shift();
							}
						}

						downloadCsvBtn.disabled = rawTimestampHistory.length === 0;

						document.getElementById("frequency").textContent = formatHz(vfoData.frequency);
						document.getElementById("viterbiBer").textContent = vfoData.live_pipeline.ccsds_conv_concat_decoder.viterbi_ber;

						const vLock = vfoData.live_pipeline.ccsds_conv_concat_decoder.viterbi_lock;
						const dLock = vfoData.live_pipeline.ccsds_conv_concat_decoder.deframer_lock;

						document.getElementById("viterbiLock").innerHTML = `<span class="${getLockStatusClass(vLock)}">${vLock ? "✓ Locked" : "✗ Unlocked"}</span>`;
						document.getElementById("deframerLock").innerHTML = `<span class="${getLockStatusClass(dLock)}">${dLock ? "✓ Locked" : "✗ Unlocked"}</span>`;

						document.getElementById("peakSnr").textContent = `${vfoData.live_pipeline.psk_demod.peak_snr.toFixed(2)} dB`;
						document.getElementById("Snr").textContent = `${vfoData.live_pipeline.psk_demod.snr.toFixed(2)} dB`;

						// Calculate running average SNR over the last 30 seconds
						const now = new Date();
						const recentSnrs = rawSnrHistory.filter((_, i) => now - rawTimestampHistory[i] <= 30000);
						if (recentSnrs.length > 0) {
							avgSNR = recentSnrs.reduce((sum, val) => sum + val, 0) / recentSnrs.length;
							document.getElementById("avgSnr").textContent = `${avgSNR.toFixed(2)} dB`;
						} else {
							document.getElementById("avgSnr").textContent = "—";
						}

						// SNR Chart Update
						if (typeof Chart !== "undefined") {
							const ctx = document.getElementById("snrChart").getContext("2d");
							if (snrChartInstance && snrChartInstance.data && snrChartInstance.data.datasets && snrChartInstance.data.datasets[0]) {
								snrChartInstance.data.labels = chartTimestampHistory.map((t) => t.toLocaleTimeString());
								snrChartInstance.data.datasets[0].data = chartSnrHistory;
								if (shouldSampleChart) {
									snrChartInstance.update("none");
								}
							} else {
								snrChartInstance = new Chart(ctx, {
									type: "line",
									data: {
										labels: chartTimestampHistory.map((t) => t.toLocaleTimeString()),
										datasets: [
											{
												label: "SNR (dB)",
												data: chartSnrHistory,
												borderColor: "rgba(6, 182, 212, 1)",
												backgroundColor: "rgba(6, 182, 212, 0.2)",
												fill: true,
												tension: 0.3,
											},
										],
									},
									options: {
										scales: {
											x: {
												title: {
													display: true,
													text: "Time",
												},
											},
											y: {
												title: {
													display: true,
													text: "SNR (dB)",
												},
											},
										},
										plugins: {
											legend: {
												display: false,
											},
										},
										responsive: true,
										maintainAspectRatio: false,
										animation: false,
										elements: {
											point: {
												radius: 0,
											},
										},
									},
								});
							}
						}
					} else {
						downloadCsvBtn.disabled = true;

						document.getElementById("frequency").textContent = "—";
						document.getElementById("viterbiBer").textContent = "—";
						document.getElementById("viterbiLock").textContent = "—";
						document.getElementById("deframerLock").textContent = "—";
						document.getElementById("peakSnr").textContent = "—";
						document.getElementById("Snr").textContent = "—";
					}
				})
				.catch((error) => {
					console.error("Error fetching API data:", error);
				})
				.finally(() => {
					isFetchingApi = false;
				});
		}, 100);

		setInterval(() => {
			const apiURI = localStorage.getItem("satdumpApiURI");
			if (!apiURI) return;
			const imageURL = apiURI.replace("/api", "/fft.jpeg");
			fetch(imageURL, { cache: "no-store" })
				.then((response) => response.blob())
				.then((blob) => {
					const blobUrl = URL.createObjectURL(blob);
					const img = document.getElementById("spectrumImage");
					if (img.src && img.src.startsWith("blob:")) {
						URL.revokeObjectURL(img.src);
					}
					img.src = blobUrl;
				})
				.catch((error) => console.error("Error fetching spectrum image:", error));
		}, 1000);
	</script>

	<style>
		* {
			margin: 0;
			box-sizing: border-box;
		}

		[hidden] {
			display: none !important;
		}

		:root {
			--primary: #0f172a;
			--primary-light: #1e293b;
			--primary-lighter: #334155;
			--accent: #06b6d4;
			--accent-hover: #0891b2;
			--accent-dark: #164e63;
			--success: #10b981;
			--warning: #f59e0b;
			--error: #ef4444;
			--text-primary: #f1f5f9;
			--text-secondary: #cbd5e1;
			--border: #475569;
			--shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
		}

		body {
			font-family:
				"Inter",
				system-ui,
				-apple-system,
				sans-serif;
			background: linear-gradient(135deg, var(--primary) 0%, #0c0f1a 100%);
			color: var(--text-primary);
			line-height: 1.5;
			min-height: 100vh;
		}

		.container {
			max-width: 1200px;
			margin: 0 auto;
			padding: 1rem;
		}

		.setup-section {
			display: flex;
			align-items: center;
			justify-content: center;
			min-height: 60vh;
		}

		.setup-card {
			background: var(--primary-light);
			border: 1px solid var(--border);
			border-radius: 8px;
			padding: 2rem;
			max-width: 400px;
			width: 100%;
			box-shadow: var(--shadow);
		}

		.setup-card h2 {
			font-size: 1.5rem;
			margin-bottom: 1.5rem;
			color: var(--text-primary);
		}

		.input-group {
			margin-bottom: 1rem;
		}

		.input-group label {
			display: block;
			margin-bottom: 0.4rem;
			font-weight: 500;
			color: var(--text-primary);
			font-size: 0.85rem;
		}

		.input-field {
			width: 100%;
			padding: 0.6rem;
			background: var(--primary);
			border: 1px solid var(--border);
			border-radius: 6px;
			color: var(--text-primary);
			font-family: monospace;
			font-size: 0.9rem;
			transition: all 0.2s ease;
		}

		.input-field:focus {
			outline: none;
			border-color: var(--accent);
			box-shadow: 0 0 0 2px rgba(6, 182, 212, 0.1);
		}

		.btn {
			padding: 0.6rem 1rem;
			border: none;
			border-radius: 6px;
			font-weight: 500;
			font-size: 0.9rem;
			cursor: pointer;
			transition: all 0.2s ease;
			font-family: "Inter", system-ui;
		}

		.btn-primary {
			background: var(--accent);
			color: var(--primary);
			width: 100%;
		}

		.btn-primary:hover {
			background: var(--accent-hover);
			transform: translateY(-1px);
			box-shadow: 0 4px 10px rgba(6, 182, 212, 0.2);
		}

		.btn-primary:disabled {
			background: var(--primary-lighter);
			color: var(--text-secondary);
			cursor: not-allowed;
			transform: none;
			box-shadow: none;
			opacity: 0.7;
		}

		.btn-icon {
			background: transparent;
			color: var(--text-secondary);
			padding: 0.4rem 0.6rem;
			font-size: 1rem;
			min-width: auto;
		}

		.btn-icon:hover {
			color: var(--accent);
		}

		.header-bar {
			display: flex;
			justify-content: space-between;
			align-items: center;
			margin-bottom: 1rem;
			padding: 0.75rem 1rem;
			background: var(--primary-light);
			border: 1px solid var(--border);
			border-radius: 6px;
			gap: 1rem;
		}

		.api-info {
			flex: 1;
			min-width: 0;
		}

		.api-link {
			color: var(--accent);
			text-decoration: none;
			font-family: monospace;
			font-size: 0.85rem;
			word-break: break-all;
			transition: color 0.2s ease;
			display: block;
			overflow: hidden;
			text-overflow: ellipsis;
		}

		.api-link:hover {
			color: var(--accent-hover);
		}

		.status-info {
			display: flex;
			align-items: center;
			gap: 0.5rem;
			white-space: nowrap;
			font-size: 0.85rem;
		}

		.status-dot {
			width: 10px;
			height: 10px;
			border-radius: 50%;
			background: var(--success);
			flex-shrink: 0;
		}

		.status-dot.pulse {
			animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
		}

		@keyframes pulse {
			0%,
			100% {
				opacity: 1;
			}
			50% {
				opacity: 0.5;
			}
		}
